# Peering Portal configuration.

# Peering Manager URL (no trailing slash).
pm_url = "https://peering.example.com"

# Peering Manager API token.
# pm_token = "your-api-token-here"

# Secret used to sign the wizard's session cookie.  Set a long random value
# in production, e.g. `python -c "import secrets; print(secrets.token_urlsafe(48))"`.
# secret_key = "change-me-in-production"

# Bind address / port for the built-in uvicorn runner.
host = "0.0.0.0"
port = 8080

# Enable uvicorn auto-reload (development only).
reload = false
