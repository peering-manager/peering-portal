{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-success shadow-sm" data-tracking-ids-add="{{ request_id }}">
        <div class="card-body text-center">
          <div class="display-3 text-success mb-3">
            <i class="bi bi-check-circle-fill"></i>
          </div>
          <h1 class="h4 mb-2">Request submitted</h1>
          <p class="text-body-secondary">
            We'll review your request and get back to you. Save the tracking
            ID below to come back and check the status later.
          </p>

          <div class="mt-3 mb-4">
            <label class="form-label small text-body-secondary">Tracking ID</label>
            <div class="input-group input-group-lg justify-content-center">
              <input
                type="text"
                class="form-control text-center font-monospace"
                value="{{ request_id }}"
                id="tracking-id"
                readonly
              />
              <button class="btn btn-outline-primary" type="button" data-copy-target="#tracking-id">
                <i class="bi bi-clipboard"></i>
              </button>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a href="/requests/{{ request_id }}" class="btn btn-primary">
              View status <i class="bi bi-arrow-right ms-1"></i>
            </a>
            <a href="/" class="btn btn-outline-secondary">
              Submit another request
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
